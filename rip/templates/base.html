<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}rip{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}">
    <script defer src="{{ url_for('static', path='app.js') }}"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Self-hosted yt-dlp frontend</p>
        <h1>rip</h1>
        <p class="lede">
          Paste a supported video URL, inspect formats, and queue downloads from one Python process.
        </p>
      </header>
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
